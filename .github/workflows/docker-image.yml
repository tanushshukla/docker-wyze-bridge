name: Docker

on:
  schedule:
    - cron: '31 22 * * 0'
  push:
    branches: [main, dev]
    tags: ['wyze-*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        run: |
          VERSION=$(grep '^VERSION=' app/.env | cut -d'=' -f2-)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate app version
        run: |
          VERSION="${{ steps.app_version.outputs.value }}"
          if [[ ! "${VERSION}" =~ ^wyze-[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid VERSION in app/.env: ${VERSION}"
            exit 1
          fi

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/wyze-')
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.app_version.outputs.value }}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match app/.env version ${{ steps.app_version.outputs.value }}"
            exit 1
          fi

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log into GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wyze-bridge
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/wyze-') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ steps.app_version.outputs.value }},enable=${{ startsWith(github.ref, 'refs/tags/wyze-') }}
            type=sha,format=long,enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD=${{ steps.app_version.outputs.value }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ steps.app_version.outputs.value }}
            GITHUB_SHA=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
